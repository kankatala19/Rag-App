services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: rag-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./uploads:/app/uploads
      - ./chroma_db:/app/chroma_db

    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit

    container_name: rag-frontend

    ports:
      - "8501:8501"

    environment:
      FASTAPI_URL: http://backend:8000

    depends_on:
      - backend

    restart: unless-stopped